    <link rel="stylesheet" href="style.css">
</head>
<body>

        <h1>Tabuada</h1>

        <div id="dados" >
            <form action="#">

        </div>
        <div>
            <select name="tabuada" id="seltab" size="10">
                <option>Digite um número acima</option>
            </select>
        </div>
    </section>
    <footer>
        <p>&copy; CursoEmVideo</p>
    </footer>
    <script src="script.js"></script>
