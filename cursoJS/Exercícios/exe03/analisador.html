<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=], initial-scale=1.0">
    <title>Analisador de Números</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
        
    </header>
    <section>
        <form action="#">
            <div id="num">
                <label for="numero">Número (entre 1 e 100): </label>
                <input type="number" name="fnum" id="fnum" min="1" max="100" >
                <input type="button" value="Adicionar" onclick="adicionar()" >
            </div>
        </form>
        <select  name="flista" id="flista" size="6">
            
            <input type="button" value="Finalizar" id="iButton" onclick="finalizar()">
        </select>
        <div id="res">
         <!--Dentro dessa div vai aparecer o conteúdo JS innerHTML com o resultado do select-->
            
        </div>
    </section>

        <footer>
            <p>&copy; CursoEmVideo</p>
        </footer>
        <script src="script.js"></script>
</body>
</html>
